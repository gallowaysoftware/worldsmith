name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [stable]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (with race detector)
        run: go test -race -timeout 240s ./...
      - name: gofmt
        run: |
          out=$(gofmt -l . | tee /dev/stderr)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files (see above)" >&2
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.0.0
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
